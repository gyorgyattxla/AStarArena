version: '3.8'

services:

  # 1. Database (MySQL)
  mysql:
    image: mysql:8.0
    container_name: astar-arena-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: astar_arena_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - astar-arena-network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # 2. Message Broker (RabbitMQ)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: astar-arena-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - astar-arena-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 50s
      retries: 3

  # 3. Backend API (Java Spring Boot)
  backend:
    build: ./backend
    container_name: astar-arena-backend
    user: root
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/astar_arena_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sokoban_eval_workspace:/workspace
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - astar-arena-network

  # 4. Frontend UI
  frontend:
    build: ./frontend
    container_name: astar-arena-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - astar-arena-network

volumes:
  db_data:
  sokoban_eval_workspace:
    name: sokoban_eval_workspace

networks:
  astar-arena-network:
    driver: bridge